apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apiIssuerNode.deployment.name }}
  labels:
    {{- include "trustid-issuer.apiIssuerNode.deploymentLabels" . | nindent 4 }}
    {{- include "trustid-issuer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiIssuerNode.deployment.replicaCount }}
  selector:
    matchLabels:
      {{- include "trustid-issuer.selectorLabels" . | nindent 6 }}
      {{- include "trustid-issuer.apiIssuerNode.Labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trustid-issuer.apiIssuerNode.Labels" . | nindent 8 }}
        {{- include "trustid-issuer.selectorLabels" . | nindent 8 }}
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
    spec:
      serviceAccountName: {{ include "helpers.serviceAccountName" . }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure"
      containers:
        - name: {{ .Values.apiIssuerNode.deployment.containerName }}
          image: {{ .Values.issuernode_repository_image }}:{{ .Values.issuernode_repository_tag }}
          imagePullPolicy: {{ .Values.apiIssuerNode.deployment.imagePullPolicy | quote }}
          ports:
          - containerPort: {{ .Values.apiIssuerNode.deployment.containerPort }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          envFrom:
          - configMapRef:
              name: {{ .Values.apiIssuerNode.deployment.apiconfigMapRef }}
          command: [ "sh", "-c" ]
          args:
            - |
              export METAKEEP_BJJ_APP_API_SECRET=$(cat /mnt/secrets-store/METAKEEP-BJJ-APP-API-SECRET) && \
              export METAKEEP_BJJ_APP_API_KEY=$(cat /mnt/secrets-store/METAKEEP-BJJ-APP-API-KEY) && \
              export ISSUER_API_AUTH_PASSWORD=$(cat /mnt/secrets-store/ISSUER-API-AUTH-PASSWORD) && \
              export ISSUER_DB_USER=$(cat /mnt/secrets-store/ISSUER-DB-USER) && \
              export ISSUER_DB_PASSWORD=$(cat /mnt/secrets-store/ISSUER-DB-PASSWORD) && \
              export ISSUER_DB_PORT=$(cat /mnt/secrets-store/ISSUER-DB-PORT) && \
              export ISSUER_DB_NAME=$(cat /mnt/secrets-store/ISSUER-DB-NAME) && \
              export ISSUER_KEY_STORE_PORT=$(cat /mnt/secrets-store/ISSUER-KEY-STORE-PORT) && \
              export VAULT_PWD=$(cat /mnt/secrets-store/VAULT-PWD) && \
              export ISSUER_RESOLVER_FILE=$(cat /mnt/secrets-store/ISSUER-RESOLVER-FILE) && \
              export ISSUER_DATABASE_URL="postgres://${ISSUER_DB_USER}:${ISSUER_DB_PASSWORD}@postgres-issuer-node-svc:${ISSUER_DB_PORT}/${ISSUER_DB_NAME}?sslmode=disable" && \
              export ISSUER_KEY_STORE_ADDRESS="http://vault-issuer-node-svc:${ISSUER_KEY_STORE_PORT}" && \
              export ISSUER_VAULT_USERPASS_AUTH_PASSWORD="${VAULT_PWD}" && \
              ./migrate && ./platform          
          livenessProbe:
            httpGet:
              path: {{ .Values.apiIssuerNode.deployment.livenessProbe.path }}
              port: {{ .Values.apiIssuerNode.deployment.livenessProbe.port }}
              httpHeaders:
              - name: {{ .Values.apiIssuerNode.deployment.livenessProbe.name }}
                value: {{ .Values.apiIssuerNode.deployment.livenessProbe.value }}
            initialDelaySeconds: {{ .Values.apiIssuerNode.deployment.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.apiIssuerNode.deployment.livenessProbe.periodSeconds }}
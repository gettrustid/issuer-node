apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure
  namespace: {{ .Release.Namespace }}
spec:
  provider: azure
  secretObjects:
    - secretName: azure
      type: Opaque
      data:
{{- range .Values.azure.secrets }}
        - objectName: {{ .name }}
          key: {{ .envVar }}
{{- end }}
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.global.azure.managedIdentityClientId | quote }}
    keyvaultName: {{ .Values.global.azure.keyVaultName | quote }}
    tenantId: {{ .Values.global.azure.tenantId | quote }}
    objects: |
      array:
{{- range .Values.azure.secrets }}
        - |
          objectName: "{{ .name }}"
          objectType: "secret"
{{- end }}

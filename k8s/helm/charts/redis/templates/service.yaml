apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redisIssuerNode.service.name }}
  labels: 
    {{ include "trustid-issuer.redisIssuerNode.staticLabel" . }}
    {{- include "trustid-issuer.redisIssuerNode.common.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "trustid-issuer.redisIssuerNode.Labels" . | nindent 4 }}
    {{- include "trustid-issuer.redisIssuerNode.selectorLabels" . | nindent 4 }}
  {{- with .Values.redisIssuerNode.service.ports }}
  ports: 
    {{-  toYaml . | nindent 2 }}
  {{- end }}